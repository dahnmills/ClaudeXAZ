<app-topbox-test-shell>
  <main class="home-main">

    <!-- Hero section -->
    <section class="home-hero">
      <div class="home-hero__content">
        <p class="home-hero__welcome">Welcome back, John</p>
        <h1 class="home-hero__title">What would you like<br>to work on today?</h1>
        <p class="home-hero__subtitle">
          Pick an action below to get started, or explore your dashboard
          for a complete overview of your activity.
        </p>
        <ds-search-bar
          placeholder="Search for a buyer"
          buttonLabel="Search"
          [(value)]="searchValue"
          [recentSearches]="recentSearches"
          (search)="onSearch($event)"
          (recentSelect)="onRecentSelect($event)"
        />
      </div>

      <!-- Illustration décorative -->
      <app-hero-illustration />
    </section>

    <!-- Action cards -->
    <section class="home-actions">
      @for (card of actionCards; track card.title) {
        <ds-action-card
          [title]="card.title"
          [description]="card.description"
          [linkLabel]="card.linkLabel"
        >
          <ds-icon slot="icon" [name]="card.icon" [size]="24" />
        </ds-action-card>
      }
    </section>

  </main>
</app-topbox-test-shell>
