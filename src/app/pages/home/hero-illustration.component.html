<!-- Card 1 : données tabulaires ─────────────────────────────── -->

<!-- Card 2 : donut chart ─────────────────────────────────────── -->
<div class="hi-card hi-card--chart">
  <!-- Donut SVG -->
  <svg class="hi-donut" width="109" height="109" viewBox="0 0 109 109" fill="none"
       xmlns="http://www.w3.org/2000/svg">
    <!-- Track -->
    <circle cx="54.5" cy="54.5" r="42" stroke="#e3e8f0" stroke-width="12"/>
    <!-- Segments (stroke-dasharray = arc length; circumference ≈ 264) -->
    <circle cx="54.5" cy="54.5" r="42" stroke="#abc4e0" stroke-width="12"
            stroke-dasharray="79 185" stroke-dashoffset="0"
            stroke-linecap="butt" transform="rotate(-90 54.5 54.5)"/>
    <circle cx="54.5" cy="54.5" r="42" stroke="#bce3d0" stroke-width="12"
            stroke-dasharray="66 198" stroke-dashoffset="-79"
            stroke-linecap="butt" transform="rotate(-90 54.5 54.5)"/>
    <circle cx="54.5" cy="54.5" r="42" stroke="rgba(243,193,72,0.6)" stroke-width="12"
            stroke-dasharray="92 172" stroke-dashoffset="-145"
            stroke-linecap="butt" transform="rotate(-90 54.5 54.5)"/>
    <!-- Clock hands -->
    <line x1="54.5" y1="54.5" x2="54.5" y2="22" stroke="#5b7fa6" stroke-width="3"
          stroke-linecap="round"/>
    <line x1="54.5" y1="54.5" x2="78" y2="54.5" stroke="#5b7fa6" stroke-width="3"
          stroke-linecap="round"/>
  </svg>

  <!-- Legend bars -->
  <div class="hi-chart-legend">
    <div class="hi-legend-row">
      <div class="hi-bar hi-bar--data hi-bar--w30 hi-bar--color-blue-dark"></div>
      <div class="hi-bar hi-bar--data hi-bar--w28 hi-bar--color-blue-light"></div>
    </div>
    <div class="hi-legend-row">
      <div class="hi-bar hi-bar--sm hi-bar--w18 hi-bar--color-green-light"></div>
    </div>
    <div class="hi-legend-row">
      <div class="hi-bar hi-bar--sm hi-bar--w95 hi-bar--color-yellow"></div>
    </div>
    <div class="hi-legend-row">
      <div class="hi-bar hi-bar--sm hi-bar--w50 hi-bar--color-200"></div>
    </div>
  </div>
</div>
