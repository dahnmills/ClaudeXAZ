<ds-modal
  [open]="open()"
  [title]="title()"
  size="large"
  [showBack]="false"
  contentHeight="640px"
  (closed)="requestClose()">

  <!-- Grey outer panel + white cards per group — same pattern as the company
       creation/edit wizards (wizard__panel / __group / __card), so criteria
       groups read as distinct sections instead of blending into one page. -->
  <div class="rm-panel">

    <div class="rm-group">
      <span class="rm-group__title">Base criteria</span>
      <div class="rm-card">
        <div class="rm-row rm-row--3">
          <tag-filter-chip variant="field" label="Sensitivity" [options]="SENSITIVITY_OPTIONS" [selected]="sensitivity()" (selectedChange)="sensitivity.set($event)" />
          <fieldset class="rm-field rm-fieldset">
            <legend class="rm-label">Exposure</legend>
            <div class="rm-exposure">
              <ds-select class="rm-exposure__op" [options]="EXPOSURE_OP_OPTIONS" [value]="exposureOp()" (selectionChange)="exposureOp.set($event)" placeholder="Any" />
              <ds-input-text class="rm-exposure__amt" inputmode="numeric" [value]="exposureAmt()" (valueChange)="exposureAmt.set($event)" placeholder="Amount" />
              <span class="rm-exposure__currency">{{ currency() }}</span>
            </div>
          </fieldset>
          <tag-filter-chip variant="field" label="New autograde" [options]="GRADE_OPTIONS" [selected]="newAutoGrade()" (selectedChange)="newAutoGrade.set($event)" />
        </div>
      </div>
    </div>

    <div class="rm-group">
      <span class="rm-group__title">Current valid grade</span>
      <div class="rm-card">
        <!-- One concept, 5 facets — kept on their own row instead of split
             across an unrelated 3-column grid. -->
        <div class="rm-row rm-row--cvg">
          <tag-filter-chip variant="field" label="Value" [options]="GRADE_OPTIONS" [selected]="cvgValue()" (selectedChange)="cvgValue.set($event)" />
          <tag-filter-chip variant="field" label="Type" [options]="GRADE_TYPE_OPTIONS" [selected]="cvgType()" (selectedChange)="cvgType.set($event)" />
          <ds-select label="Freshness" [options]="FRESHNESS_OPTIONS" [value]="cvgFreshness()" (selectionChange)="cvgFreshness.set($event)" />
          <fieldset class="rm-field rm-fieldset">
            <legend class="rm-label">Transferred</legend>
            <ds-segmented-control [options]="TRANSFERRED_OPTIONS" [selected]="transferred()" (selectedChange)="transferred.set($event)" />
          </fieldset>
          <ds-select label="New autograde vs current valid grade" [options]="COMPARISON_OPTIONS" [value]="newVsCvg()" (selectionChange)="newVsCvg.set($event)" />
        </div>
      </div>
    </div>

    <div class="rm-group">
      <span class="rm-group__title">Last checked autograde</span>
      <div class="rm-card">
        <div class="rm-row rm-row--3">
          <tag-filter-chip variant="field" label="Value" [options]="GRADE_OPTIONS" [selected]="lastAgValue()" (selectedChange)="lastAgValue.set($event)" />
          <ds-select label="Freshness" [options]="FRESHNESS_OPTIONS" [value]="lastAgFreshness()" (selectionChange)="lastAgFreshness.set($event)" />
          <ds-select label="New autograde vs last checked autograde" [options]="COMPARISON_OPTIONS" [value]="newVsLastAg()" (selectionChange)="newVsLastAg.set($event)" />
        </div>
      </div>
    </div>

    <div class="rm-group">
      <span class="rm-group__title">Company profile</span>
      <div class="rm-card">
        <div class="rm-row rm-row--3">
          <tag-filter-chip variant="field" label="NACE" [options]="NACE_OPTIONS" [selected]="nace()" (selectedChange)="nace.set($event)" />
          <tag-filter-chip variant="field" label="Legal form" [options]="LEGAL_FORM_OPTIONS" [selected]="legalForm()" (selectedChange)="legalForm.set($event)" />
          <tag-filter-chip variant="field" label="Company role" [options]="COMPANY_ROLE_OPTIONS" [selected]="companyRole()" (selectedChange)="companyRole.set($event)" />
        </div>
      </div>
    </div>

    <div class="rm-group">
      <span class="rm-group__title">Outcome</span>
      <div class="rm-card">
        <div class="rm-outcome-cards" role="radiogroup" aria-label="Rule outcome">
          @for (card of DECISION_CARDS; track card.value) {
            <ds-radio-card
              [label]="card.label"
              [sublabel]="card.sublabel"
              [tone]="card.tone"
              [selected]="decision() === card.value"
              (selectedChange)="selectDecision(card.value)" />
          }
        </div>
      </div>
    </div>

  </div>

  <div slot="actions">
    <ds-button type="tertiary" (clicked)="requestClose()">Cancel</ds-button>
    <ds-button type="primary" [disabled]="!canSave()" (clicked)="onSave()">{{ isEdit() ? 'Save' : 'Create' }}</ds-button>
  </div>
</ds-modal>

<ds-confirm-dialog
  [open]="confirmCloseOpen()" tone="danger" title="Discard changes?"
  confirmLabel="Discard" cancelLabel="Keep editing"
  (confirmed)="confirmClose()" (cancelled)="cancelClose()">
  Any unsaved changes to this rule will be lost.
</ds-confirm-dialog>
