<ds-card [noPadding]="true" [elevated]="expanded()">
  <div class="rule-card__head" role="button" tabindex="0"
       [attr.aria-expanded]="expanded()" [attr.aria-label]="ariaLabel()"
       (click)="toggle()" (keydown.enter)="toggle()" (keydown.space)="$event.preventDefault(); toggle()">
    <span class="rule-card__pos" aria-hidden="true">{{ rule().position.toString().padStart(2, '0') }}</span>

    <div class="rule-card__summary">
      @for (row of summaryRows(); track row.label) {
        <div class="rule-card__field">
          <span class="rule-card__field-label">{{ row.label }}</span>
          <span class="rule-card__field-value" [class.rule-card__field-value--any]="row.isAny" [title]="row.value">{{ row.value }}</span>
        </div>
      }
    </div>

    <div class="rule-card__badges">
      <ds-badge [status]="decisionBadge().status" [variant]="decisionBadge().variant" [label]="decisionBadge().label" />
      <ds-badge [status]="statusBadge().status" variant="light" [label]="statusBadge().label" />
      @if (volume() !== null) {
        <span class="rule-card__volume">
          <ds-badge status="neutral" variant="light" [label]="volume()!.toFixed(2) + '%'" />
        </span>
      }
    </div>

    <div class="rule-card__actions" (click)="$event.stopPropagation()" (keydown)="$event.stopPropagation()">
      @if (mode() === 'edit') {
        <ds-button-icon type="plain" tone="default" ariaLabel="Rule actions" (clicked)="toggleMenu()">
          <ds-icon name="context-vertical" [size]="16" />
        </ds-button-icon>
        @if (menuOpen()) {
          <ds-flyout-menu class="rule-card__menu">
            <ds-flyout-menu-item label="Edit"      icon="edit"  (clicked)="onEdit()" />
            <ds-flyout-menu-item label="Move up"   icon="arrow-up"   (clicked)="onMoveUp()" />
            <ds-flyout-menu-item label="Move down" icon="arrow-down" (clicked)="onMoveDown()" />
            <ds-flyout-menu-item label="Delete"    icon="trash" (clicked)="onRemove()" />
          </ds-flyout-menu>
        }
      }
      <span class="rule-card__chevron" role="button" tabindex="-1" (click)="toggle()">
        <ds-icon [name]="expanded() ? 'chevron-up' : 'chevron-down'" [size]="16" />
      </span>
    </div>
  </div>

  @if (expanded()) {
    <div class="rule-card__body">
      <ds-properties-panel [sections]="detailSections()" [columns]="3" variant="flat" layout="stacked" />
    </div>
  }
</ds-card>
