<main class="hub">
  <header class="hub__head">
    <span class="hub__brand">
      <span class="hub__mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none"><path d="M4 5h16M4 12h10M4 19h7" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"/></svg>
      </span>
      Qirin · Prototype
    </span>
    <h1 class="hub__title">Où voulez-vous aller ?</h1>
    <p class="hub__lead">Quatre espaces, quatre usages. Choisissez le vôtre.</p>
  </header>

  <div class="hub__grid">
    @for (z of zones(); track z.path) {
      <a class="zone zone--{{ z.accent }}" [routerLink]="z.path">
        <span class="zone__icon" aria-hidden="true">
          @switch (z.icon) {
            @case ('proto') { <svg viewBox="0 0 24 24" width="22" height="22" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M3 9h18M9 21V9" stroke="currentColor" stroke-width="1.8"/></svg> }
            @case ('review') { <svg viewBox="0 0 24 24" width="22" height="22" fill="none"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg> }
            @case ('isolated') { <svg viewBox="0 0 24 24" width="22" height="22" fill="none"><rect x="4" y="10" width="16" height="11" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M8 10V7a4 4 0 0 1 8 0v3" stroke="currentColor" stroke-width="1.8"/></svg> }
            @case ('results') { <svg viewBox="0 0 24 24" width="22" height="22" fill="none"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg> }
          }
        </span>
        <span class="zone__eyebrow">{{ z.eyebrow }}</span>
        <h2 class="zone__title">{{ z.title }}</h2>
        <p class="zone__desc">{{ z.desc }}</p>
        <span class="zone__cta">
          {{ z.cta }}
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </span>
      </a>
    }
  </div>
</main>
