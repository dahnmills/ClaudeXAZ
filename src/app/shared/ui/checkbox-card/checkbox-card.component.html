<div class="ds-checkbox-card__checkbox">
  <div class="ds-checkbox-card__box">
    @if (checked()) {
      <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 10.5L8.5 15L16 5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    }
  </div>
</div>

<div class="ds-checkbox-card__body">
  <span class="ds-checkbox-card__label">{{ label() }}</span>
  @if (sublabel()) {
    <span class="ds-checkbox-card__sublabel">{{ sublabel() }}</span>
  }
</div>

@if (badge()) {
  <ds-badge [label]="badge()" status="info" variant="strong" size="s" />
}
