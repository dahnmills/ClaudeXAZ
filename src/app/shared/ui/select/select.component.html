@if (label()) {
  <label class="ds-select__label" [for]="inputId()">{{ label() }}</label>
}

<div class="ds-select__container">
  <button
    type="button"
    class="ds-select__field"
    [id]="inputId()"
    [disabled]="disabled()"
    [attr.aria-invalid]="error() || null"
    [attr.aria-haspopup]="'listbox'"
    [attr.aria-expanded]="open()"
    (click)="$event.stopPropagation(); toggle()"
  >
    <span
      class="ds-select__value"
      [class.ds-select__value--placeholder]="!selectedLabel()"
    >{{ selectedLabel() || placeholder() }}</span>
  </button>
  <ds-icon class="ds-select__chevron" name="chevron-down" [size]="16" />

  @if (open()) {
    <div class="ds-select__flyout" role="listbox">
      <ds-flyout-menu>
        @if (options().length === 0) {
          <ds-flyout-menu-item label="No options" [disabled]="true" />
        } @else {
          @for (option of options(); track option.value) {
            <ds-flyout-menu-item
              [label]="option.label"
              [disabled]="!!option.disabled"
              (clicked)="selectOption(option)"
            />
          }
        }
      </ds-flyout-menu>
    </div>
  }
</div>

@if (error() && errorMessage()) {
  <span class="ds-select__error-msg" role="alert">{{ errorMessage() }}</span>
}
