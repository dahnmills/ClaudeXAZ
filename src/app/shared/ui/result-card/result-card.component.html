<div class="ds-result-card__main">
  <div class="ds-result-card__left">
    <ds-icon-tile size="m" tone="brand">
      <ds-icon name="grid" [size]="24" />
    </ds-icon-tile>
    <div class="ds-result-card__info">
      <div class="ds-result-card__name-row">
        <span class="ds-result-card__name">{{ data().name }}</span>
        @if (data().city) {
          <span class="ds-result-card__sep">-</span>
          <span class="ds-result-card__city">{{ data().city }}</span>
        }
        @if (exists() && data().companyId) {
          <button
            type="button"
            class="ds-result-card__id-badge"
            dsTooltip="Copy ID"
            dsTooltipPosition="top-center"
            (click)="copyId()"
          >
            <ds-icon name="hash" [size]="16" />
            <span class="ds-result-card__id-value">{{ data().companyId }}</span>
            <ds-icon name="copy" [size]="16" />
          </button>
        }
      </div>
      <span class="ds-result-card__address">{{ data().address }}</span>
    </div>
  </div>

  <div class="ds-result-card__right">
    <div class="ds-result-card__score">
      <span class="ds-result-card__score-value">{{ data().score ?? 0 }}</span>
      <ds-progress-bar class="ds-result-card__score-bar" [value]="(data().score ?? 0)" size="s" tone="brand" />
    </div>
    <div class="ds-result-card__actions">
      <ds-button-icon
        type="plain"
        tone="accent"
        ariaLabel="Add"
        dsTooltip="Create a company"
        dsTooltipPosition="top-center"
        class="ds-result-card__add"
        [class.ds-result-card__add--hidden]="exists()"
        [attr.tabindex]="exists() ? -1 : null"
        [attr.aria-hidden]="exists() ? true : null"
        (clicked)="!exists() && added.emit()"
      >
        <ds-icon name="plus" [size]="20" />
      </ds-button-icon>
      <ds-button-icon
        type="plain"
        tone="accent"
        [ariaLabel]="favorited() ? 'Unfavorite' : 'Favorite'"
        class="ds-result-card__star"
        [class.ds-result-card__star--on]="favorited()"
        dsTooltip="Add to favorite"
        dsTooltipPosition="top-center"
        (clicked)="starred.emit()"
      >
        <ds-icon [name]="favorited() ? 'star-filled' : 'star'" [size]="20" />
      </ds-button-icon>
      <ds-button-icon type="plain" tone="accent" ariaLabel="Toggle details"
        [disabled]="!hasDetails()"
        (clicked)="hasDetails() && toggled.emit()">
        <ds-icon [name]="open() ? 'chevron-up' : 'chevron-down'" [size]="20" />
      </ds-button-icon>
    </div>
  </div>
</div>

@if (open()) {
  <ds-divider class="ds-result-card__divider" />

  <div class="ds-result-card__details">
    @if (detailSections().length) {
      <ds-properties-panel
        class="ds-result-card__properties"
        [sections]="detailSections()"
        [columns]="3"
        variant="flat"
      />
    }
    @if (data().providers) {
      <div class="ds-result-card__col">
        <span class="ds-result-card__col-title">Info providers</span>
        @for (p of data().providers!; track p) {
          <span class="ds-result-card__col-value">{{ p }}</span>
        }
      </div>
    }
  </div>
}
