<div class="ds-checkbox__container">
  <div
    class="ds-checkbox__box"
    [class.ds-checkbox__box--checked]="showCheck() || showIndeterminate()"
    [style.background-color]="checkedColor()"
    [style.border-color]="checkedBorderColor() || 'var(--semantic-color-interactive-border-strong-alt-default)'"
    [style.--cb-checked-hover]="checkedHoverColor()"
    [style.--cb-indeterminate-hover]="indeterminateHoverColor()"
  >
    @if (showCheck()) {
      <div class="ds-checkbox__check">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 10.5L8.5 15L16 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    }
    @if (showIndeterminate()) {
      <div class="ds-checkbox__indeterminate" [style.border-color]="indeterminateBorderColor()">
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 8H13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
    }
  </div>
  @if (label()) {
    <span class="ds-checkbox__label">{{ label() }}</span>
  }
</div>
