@if (currentPage()) {
  <span class="ds-crumb__label" aria-current="page">{{ label() }}</span>
} @else {
  <a
    class="ds-crumb__link"
    [attr.href]="null"
    [attr.aria-disabled]="disabled() || null"
    [attr.tabindex]="disabled() ? -1 : null"
    (click)="onClick($event)"
  >
    <span class="ds-crumb__label">{{ label() }}</span>
  </a>
  <ds-icon class="ds-crumb__separator" name="chevron-right" [size]="16" />
}
