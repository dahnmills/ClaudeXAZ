@if (currentPage()) {
  <span class="ds-crumb__current" aria-current="page">{{ label() }}</span>
} @else {
  <ds-link
    [href]="href()"
    [disabled]="disabled()"
    tone="neutral"
    size="m"
    weight="regular"
    (click)="onClick($event)"
  >{{ label() }}</ds-link>
  <ds-icon class="ds-crumb__separator" name="chevron-right" [size]="16" />
}
