<div class="ds-side-nav__items" role="menu">
  <ng-content />
</div>
<div class="ds-side-nav__bottom">
  <ds-side-nav-item
    [attr.aria-expanded]="!collapsed()"
    [attr.aria-label]="collapsed() ? 'Open panel' : 'Close panel'"
    (clicked)="toggle()"
  >
    <ds-icon slot="icon" name="panel-left" [size]="20" />
    {{ collapsed() ? 'Open panel' : 'Close panel' }}
  </ds-side-nav-item>
</div>
