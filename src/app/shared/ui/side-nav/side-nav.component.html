<div class="ds-side-nav__items" role="menu">
  <ng-content />
</div>
<button
  type="button"
  class="ds-side-nav__toggle"
  [attr.aria-expanded]="!collapsed()"
  [attr.aria-label]="collapsed() ? 'Expand navigation' : 'Collapse navigation'"
  (click)="toggle()"
>
  <ds-icon [name]="collapsed() ? 'chevron-double-right' : 'chevron-double-left'" [size]="16" />
</button>
