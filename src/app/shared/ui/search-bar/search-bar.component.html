<!-- ── Barre de recherche ─────────────────────────────────────── -->
<div class="ds-search-bar__field">
  <ds-icon class="ds-search-bar__icon" name="search" [size]="24" />

  <input
    class="ds-search-bar__input"
    type="search"
    [placeholder]="placeholder()"
    [(ngModel)]="value"
    (focus)="onInputFocus()"
    (keydown)="onKeydown($event)"
    aria-label="Search"
    [attr.aria-expanded]="flyoutOpen()"
    aria-haspopup="listbox"
  />
</div>

<ds-button type="primary" (click)="onSearch()">{{ buttonLabel() }}</ds-button>

<!-- ── Flyout — recherches récentes ──────────────────────────── -->
@if (flyoutOpen() && recentSearches().length > 0) {
  <div class="ds-search-flyout" role="listbox" aria-label="Recherches récentes">

    <!-- Section RECENT -->
    <div class="ds-search-flyout__section">
      <p class="ds-search-flyout__section-label">RECENT</p>

      <ul class="ds-search-flyout__list">
        @for (item of recentSearches(); track item.label) {
          <li class="ds-search-flyout__item"
              role="option"
              (click)="selectRecent(item)"
              (keydown.enter)="selectRecent(item)"
              tabindex="0">
            <div class="ds-search-flyout__item-left">
              <ds-icon class="ds-search-flyout__item-icon" name="clock" [size]="16" />
              <span class="ds-search-flyout__item-label">{{ item.label }}</span>
            </div>

            <ds-badge
              [label]="item.badgeLabel"
              [status]="item.badgeStatus"
              [variant]="'light'"
              [size]="'s'"
            />
          </li>
        }
      </ul>
    </div>

    <ds-divider class="ds-search-flyout__divider" />

    <!-- Footer : Advanced search -->
    <div class="ds-search-flyout__footer">
      <ds-link
        [href]="advancedSearchHref()"
        size="s"
        weight="semi-bold"
        tone="default"
      >
        Advanced search
        <ds-icon slot="icon-right" name="arrow-right" [size]="16" />
      </ds-link>
    </div>

  </div>
}
